name: Unity Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Unity Android APK and AAB
    runs-on: ubuntu-latest

    env:
      UNITY_VERSION: 2022.3.20f1
      BUILD_DIR: Builds/Android
      PROJECT_PATH: unity-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-Android-${{ runner.os }}-${{ hashFiles(format('{0}/Assets/**', env.PROJECT_PATH), format('{0}/Packages/**', env.PROJECT_PATH), format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            Library-Android-${{ runner.os }}-

      - name: Decode Android keystore
        shell: bash
        run: |
          mkdir -p "${{ env.PROJECT_PATH }}/UserSettings/ci-keystore"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > "${{ env.PROJECT_PATH }}/UserSettings/ci-keystore/android.keystore"

      - name: Build APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: Android
          versioning: None
          androidExportType: androidPackage
          androidKeystoreName: UserSettings/ci-keystore/android.keystore
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          buildsPath: ${{ env.BUILD_DIR }}/APK
          customParameters: -nographics

      - name: Build AAB
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: Android
          versioning: None
          androidExportType: androidAppBundle
          androidKeystoreName: UserSettings/ci-keystore/android.keystore
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          buildsPath: ${{ env.BUILD_DIR }}/AAB
          customParameters: -nographics

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.BUILD_DIR }}/APK/**/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ env.BUILD_DIR }}/AAB/**/*.aab
          if-no-files-found: error

      - name: Send Slack notification
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          SHORT_SHA=$(echo "$COMMIT" | cut -c1-7)

          payload=$(cat <<EOF
          {
            "text": "Unity Android build succeeded",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Unity Android Build Successful*"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n$REPO"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n$BRANCH"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit:*\n$SHORT_SHA"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Artifacts / Run:*\n$RUN_URL"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Cleanup keystore
        if: always()
        shell: bash
        run: |
          rm -f "${{ env.PROJECT_PATH }}/UserSettings/ci-keystore/android.keystore"